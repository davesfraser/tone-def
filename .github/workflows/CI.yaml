# This workflow is the automated quality gate for the repo
# It runs the same checks developers should run locally

name: CI

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Linux quality checks
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          version: ">=0.11.6"
          enable-cache: true

      - name: Install dependencies from committed lockfile
        run: uv sync --frozen

      - name: Audit dependencies for known vulnerabilities
        run: uv audit --preview-features audit

      - name: Check formatting
        run: uv run ruff format --check .

      - name: Lint
        run: uv run ruff check src tests notebooks ui

      - name: Check marimo notebooks
        run: uv run marimo check notebooks/marimo

      - name: Type check
        run: uv run mypy src tests

      - name: Run tests
        run: uv run pytest -q

      - name: Build package
        run: uv build
